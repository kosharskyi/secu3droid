name: Android Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release-build:
    name: Release build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Restore signing config
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > "$GITHUB_WORKSPACE/ci-keystore.jks"
          cat > keystore.properties <<EOF
          KEY_ALIAS=${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD=${{ secrets.RELEASE_KEY_PASSWORD }}
          KEYSTORE_PATH=$GITHUB_WORKSPACE/ci-keystore.jks
          KEYSTORE_PASSWORD=${{ secrets.RELEASE_STORE_PASSWORD }}
          EOF

      - name: Restore Google Services config
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > app/google-services.json

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Prepare release APK
        run: |
          mkdir -p build/release
          cp app/build/outputs/apk/release/app-release.apk "build/release/Secu3Droid-${{ github.ref_name }}.apk"
